<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications — Smart Loom</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <div class="container py-5">
    <h1 style="font-family:'Playfair Display',serif;">Notifications</h1>
    <a href="/dashboard" class="btn btn-outline-sl btn-sm mb-4">← Dashboard</a>
    {% if notifications %}
    <ul class="list-group">
      {% for n in notifications %}
      <li class="list-group-item d-flex justify-content-between">
        <span>{{ n.message }}</span>
        <small class="text-muted">{{ n.created_at }}</small>
      </li>
      {% endfor %}
    </ul>
    {% else %}
    <p class="text-muted-sl">No notifications yet.</p>
    {% endif %}
  </div>
</body>
</html>
