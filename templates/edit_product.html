<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Product — Smart Loom</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <div class="container py-5" style="max-width:640px;">
    <h1 style="font-family:'Playfair Display',serif;">Edit Product</h1>
    <p class="text-muted-sl">{{ product.product_code }}</p>
    <form method="POST" class="sl-card p-4">
      <div class="mb-3">
        <label class="sl-form-label">Product Name</label>
        <input class="sl-input" name="name" value="{{ product.product_name }}" required />
      </div>
      <div class="mb-3">
        <label class="sl-form-label">Category</label>
        <select class="sl-input" name="category">
          {% for cat in ['Saree','Dupatta','Yardage','Shawl'] %}
          <option {% if product.category == cat %}selected{% endif %}>{{ cat }}</option>
          {% endfor %}
        </select>
      </div>
      {% if session['role'] == 'Admin' %}
      <div class="mb-3">
        <label class="sl-form-label">Weaver</label>
        <input class="sl-input" name="weaver" value="{{ product.weaver_name }}" />
      </div>
      {% endif %}
      <div class="row g-3 mb-3">
        <div class="col-6">
          <label class="sl-form-label">Price (₹)</label>
          <input type="number" class="sl-input" name="price" value="{{ product.price }}" required />
        </div>
        <div class="col-6">
          <label class="sl-form-label">Stock</label>
          <input type="number" class="sl-input" name="stock" value="{{ product.stock }}" required />
        </div>
      </div>
      <div class="mb-3">
        <label class="sl-form-label">Description</label>
        <textarea class="sl-input" name="description" rows="3">{{ product.description or '' }}</textarea>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-accent-sl">Save</button>
        <a href="/products" class="btn btn-outline-sl">Cancel</a>
      </div>
    </form>
  </div>
</body>
</html>
