{% if pagination and pagination.total_pages > 1 %}
<nav class="mt-3 d-flex justify-content-between align-items-center">
  <span class="text-muted-sl small">Page {{ pagination.page }} of {{ pagination.total_pages }} ({{ pagination.total_count }} items)</span>
  <ul class="pagination pagination-sm mb-0">
    <li class="page-item {% if not pagination.has_prev %}disabled{% endif %}">
      <a class="page-link" href="{{ pagination.prev_url or '#' }}">Previous</a>
    </li>
    <li class="page-item {% if not pagination.has_next %}disabled{% endif %}">
      <a class="page-link" href="{{ pagination.next_url or '#' }}">Next</a>
    </li>
  </ul>
</nav>
{% endif %}
